    Helix Stax v15 — horizontal lockup, light mode. Canvas: 810×175.
    Mark: crop viewBox 57 131 374 250 → rendered 230×175.
    Layout: [MARK 0–230] [22px gap] [HELIX text-anchor=start x=252] [22px gap] [STAX text-anchor=start x=532]
    Baseline y=175 — aligns text floor with bar 4 bottom edge (250 viewBox units × 0.7 scale = 175px).
    Equal spacing: mark-end(230) → HELIX-start(252) = 22px; HELIX-end(~510) → STAX-start(532) = 22px.
    WCAG-verified bar colors on #F7F5F0.
    FONT NOTE: This file uses Space Grotesk from Google Fonts. Load externally:
