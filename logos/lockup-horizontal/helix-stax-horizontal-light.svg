<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 810 175" role="img" aria-label="Helix Stax horizontal lockup — light mode" id="helix-v15-hz-light">
  <title>Helix Stax horizontal lockup — light mode</title>
