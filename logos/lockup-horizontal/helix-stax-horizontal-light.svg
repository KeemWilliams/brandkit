    <polygon id="helix-v15-hz-bar4-teal-deep" points="81.0,329 431.0,329 407.0,381 57.0,381" fill="#1E4E38"/>
  </svg>
  <!-- Wordmark: Space Grotesk 600/200, dark text on light. Baseline y=175 (bar 4 floor). Equal 22px gaps. -->
