<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 430" role="img" aria-label="Helix Stax amber variant stacked lockup — dark mode" id="helix-v15-lockup-amber-dark">
  <title>Helix Stax amber variant stacked lockup — dark mode</title>
  <!--
    Helix Stax v15 — amber wordmark variant, dark mode.
    HELIX text: slate #8B949E. STAX text: amber #C4975A.
    FONT NOTE: This file uses Space Grotesk from Google Fonts. Load externally:
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@200;600&display=swap" rel="stylesheet">
    Or convert text to paths for fully self-contained export.
  -->
  <!-- Mark bars — dark mode colors (no stroke on amber variant per preview) -->
